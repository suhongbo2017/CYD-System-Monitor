; ============================================================
; PlatformIO Configuration for CYD System Monitor
; ============================================================
;
; Two common CYD variants:
;   1. Standard CYD (ESP32-2432S028R): VSPI + ST7789V
;   2. CYD PLUS (ESP32-2432S028R PLUS): HSPI + ST7789V (or ILI9341)
;
; ⚠️ See README.md "CYD PLUS Pitfalls" section for all the traps!
; ============================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; If you use local Arduino libraries, uncomment and set the path:
; lib_extra_dirs = /YOUR_PATH/libraries

build_flags =
    -I include
    -I lib/**
    ; ========== TFT_eSPI Configuration ==========
    ; Use build_flags instead of modifying User_Setup.h
    -D USER_SETUP_LOADED

    ; ---- Display Driver ----
    ; Try ST7789_DRIVER first (most CYD boards).
    ; If garbled, try ILI9341_DRIVER instead.
    -D ST7789_DRIVER
    ; -D ILI9341_DRIVER       ; Alternative driver

    ; ---- SPI Port (CRITICAL!) ----
    ; CYD PLUS uses HSPI (MOSI=13, MISO=12, SCLK=14)
    ; Standard CYD uses VSPI (MOSI=23, MISO=19, SCLK=18)
    -D USE_HSPI_PORT
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    ; For standard CYD, comment out the above and use:
    ; -D TFT_MISO=19
    ; -D TFT_MOSI=23
    ; -D TFT_SCLK=18

    ; ---- Pin Mapping ----
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=4
    -D TOUCH_CS=21

    ; ---- SPI Speed ----
    ; Lower if you see random pixel corruption
    -D SPI_FREQUENCY=27000000
    -D SPI_READ_FREQUENCY=16000000
    ; Try these if garbled:
    ; -D SPI_FREQUENCY=20000000
    ; -D SPI_READ_FREQUENCY=10000000

    ; ---- Fonts ----
    -D LOAD_GLCD
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_FONT6
    -D LOAD_FONT7
    -D LOAD_FONT8
    -D LOAD_GFXFF
    -D SMOOTH_FONT

lib_deps =
    bblanchon/ArduinoJson @ ^6.21.3
    ESP32WebServer
    Preferences
    lvgl @ ^8.3.0
    bodmer/TFT_eSPI

board_build.filesystem = spiffs